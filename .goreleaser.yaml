---
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - goos:
      - darwin
    goarch:
      - amd64
      - arm64
    # CGo required: tinygo.org/x/bluetooth wraps CoreBluetooth via
    # the cbgo package (needs `-framework CoreBluetooth` at link
    # time), and mattn/go-sqlite3 is a CGo binding. GoReleaser
    # defaults to CGO_ENABLED=0 for cross-compile safety — that's
    # how the BLE dep started failing with "undefined: CentralManager"
    # in cbgo's own Darwin-only files (they get build-tagged out
    # when CGo is off, leaving the delegate file unable to resolve).
    env:
      - CGO_ENABLED=1
    # Stamp build identity into the binary so `meshx version` reports
    # the release tag, commit, and build date instead of the empty
    # defaults caarlos0/go-version falls back to under `go build`.
    ldflags:
      - -s -w -X {{ .ModulePath }}/internal/meshx.Date={{ .CommitDate }}
      - -X {{ .ModulePath }}/internal/meshx.Commit={{ .Commit }}
      - -X {{ .ModulePath }}/internal/meshx.Version={{ .Version }}
      - -X {{ .ModulePath }}/internal/meshx.BuiltBy=goreleaser

archives:
  - formats:
    - binary
checksum:
  name_template: 'checksums.txt'
snapshot:
  version_template: "{{ incpatch .Version }}.dev"
changelog:
  sort: asc
  filters:
    exclude:
      - "^test(\\(.+?\\))?:"
      - "^chore(\\(.+?\\))?:"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy
  # Regexes accept the conventional-commits optional scope — both
  # `feat: foo` AND `feat(scope): foo` match. Without the `(\(.+?\))?`
  # every scoped subject (which is most of ours) fell through to
  # "Others", making the grouping useless.
  groups:
    - title: "Features"
      regexp: "^.*?feat(\\(.+?\\))?:.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*?fix(\\(.+?\\))?:.*$"
      order: 1
    - title: "Performance"
      regexp: "^.*?perf(\\(.+?\\))?:.*$"
      order: 2
    - title: "Refactor"
      regexp: "^.*?refactor(\\(.+?\\))?:.*$"
      order: 3
    - title: "Docs"
      regexp: "^.*?docs(\\(.+?\\))?:.*$"
      order: 4
    - title: "CI"
      regexp: "^.*?ci(\\(.+?\\))?:.*$"
      order: 5
    - title: "Build"
      regexp: "^.*?build(\\(.+?\\))?:.*$"
      order: 6
    - title: "Style"
      regexp: "^.*?style(\\(.+?\\))?:.*$"
      order: 7
    - title: Others
      order: 999
